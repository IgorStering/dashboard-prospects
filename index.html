<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Prospecção</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #080C18;
      --bg2:    #0F1528;
      --bg3:    #161D35;
      --gold:   #C9A84C;
      --gold2:  #E8C96A;
      --white:  #F0F0EC;
      --gray:   #8A90A2;
      --green:  #2ECC71;
      --blue:   #3B82F6;
      --yellow: #F59E0B;
      --red:    #EF4444;
      --r:      12px;
    }
    body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--bg2); border-bottom: 1px solid rgba(201,168,76,.15);
      padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .logo span { color: var(--white); font-weight: 400; }
    .header-sub { color: var(--gray); font-size: .82rem; margin-top: 2px; }

    /* ── MAIN ── */
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--bg2); border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--r); padding: 18px 20px;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .lbl { color: var(--gray); font-size: .78rem; margin-top: 4px; }
    .num.total  { color: var(--gold); }
    .num.verde  { color: var(--green); }
    .num.azul   { color: var(--blue); }
    .num.amarelo{ color: var(--yellow); }
    .num.vermelho{ color: var(--red); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%; background: var(--bg2); border: 1px solid rgba(255,255,255,.1);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: .9rem;
      padding: 10px 16px 10px 40px; border-radius: 8px; outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 1rem; pointer-events: none; }
    .filter-btn {
      background: var(--bg2); border: 1px solid rgba(255,255,255,.1);
      color: var(--gray); font-size: .82rem; font-weight: 500;
      padding: 10px 16px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }
    .add-btn {
      background: var(--gold); color: var(--bg); font-weight: 700; font-size: .85rem;
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; transition: background .2s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--gold2); }

    /* ── TABLE ── */
    .table-wrap { background: var(--bg2); border: 1px solid rgba(255,255,255,.06); border-radius: var(--r); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--bg3); color: var(--gray); font-size: .75rem; font-weight: 600;
      letter-spacing: .8px; text-transform: uppercase; padding: 14px 16px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 14px 16px; font-size: .88rem; vertical-align: middle; }

    .company-name { font-weight: 600; color: var(--white); }
    .company-addr { color: var(--gray); font-size: .78rem; margin-top: 2px; }

    .nicho-badge {
      display: inline-block; font-size: .72rem; font-weight: 600; padding: 3px 10px;
      border-radius: 50px; white-space: nowrap;
    }
    .nicho-psico   { background: rgba(139,92,246,.15); color: #A78BFA; border: 1px solid rgba(139,92,246,.3); }
    .nicho-medico  { background: rgba(59,130,246,.15);  color: #60A5FA; border: 1px solid rgba(59,130,246,.3); }
    .nicho-salao   { background: rgba(236,72,153,.15);  color: #F472B6; border: 1px solid rgba(236,72,153,.3); }
    .nicho-escola  { background: rgba(245,158,11,.15);  color: #FCD34D; border: 1px solid rgba(245,158,11,.3); }
    .nicho-academia{ background: rgba(16,185,129,.15);  color: #34D399; border: 1px solid rgba(16,185,129,.3); }
    .nicho-odonto  { background: rgba(14,165,233,.15);  color: #38BDF8; border: 1px solid rgba(14,165,233,.3); }
    .nicho-contabil{ background: rgba(251,146,60,.15);  color: #FB923C; border: 1px solid rgba(251,146,60,.3); }
    .nicho-barber  { background: rgba(168,85,247,.15);  color: #C084FC; border: 1px solid rgba(168,85,247,.3); }

    .contact-links { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .contact-btn {
      display: inline-flex; align-items: center; gap: 5px; font-size: .75rem; font-weight: 600;
      padding: 5px 10px; border-radius: 6px; text-decoration: none; border: none; cursor: pointer;
      transition: opacity .2s;
    }
    .contact-btn:hover { opacity: .8; }
    .btn-wa  { background: rgba(37,211,102,.15); color: #25D366; border: 1px solid rgba(37,211,102,.3); }
    .btn-web { background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
    .btn-tel { background: rgba(255,255,255,.08); color: var(--gray); border: 1px solid rgba(255,255,255,.12); }
    .no-site { font-size: .75rem; color: var(--red); font-weight: 600; }

    .status-sel {
      background: var(--bg3); border: 1px solid rgba(255,255,255,.1);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: .78rem;
      padding: 5px 10px; border-radius: 6px; cursor: pointer; outline: none;
    }

    .notes-input {
      background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,.1);
      color: var(--gray); font-family: 'Inter', sans-serif; font-size: .78rem;
      padding: 4px 2px; width: 140px; outline: none; transition: border-color .2s;
    }
    .notes-input:focus { border-color: var(--gold); color: var(--white); }
    .notes-input::placeholder { color: rgba(138,144,162,.4); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid rgba(201,168,76,.2);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 480px;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; color: var(--gold); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .78rem; color: var(--gray); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .form-group input, .form-group select {
      width: 100%; background: var(--bg3); border: 1px solid rgba(255,255,255,.1);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: .9rem;
      padding: 10px 14px; border-radius: 8px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
    .modal-btns { display: flex; gap: 12px; margin-top: 24px; }
    .modal-save { flex: 1; background: var(--gold); color: var(--bg); font-weight: 700; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
    .modal-cancel { flex: 1; background: transparent; color: var(--gray); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); cursor: pointer; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty p { margin-top: 8px; font-size: .9rem; }

    @media (max-width: 900px) {
      main { padding: 16px; }
      header { padding: 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      table { display: block; overflow-x: auto; }
    }
    /* ── LOGIN ── */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--bg2); border: 1px solid rgba(201,168,76,.2);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-logo { font-size: 1.3rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
    .login-sub  { color: var(--gray); font-size: .85rem; margin-bottom: 32px; }
    .login-box input {
      width: 100%; background: var(--bg3); border: 1px solid rgba(255,255,255,.1);
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 1rem;
      padding: 13px 16px; border-radius: 10px; outline: none; text-align: center;
      letter-spacing: 3px; margin-bottom: 12px; transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; background: var(--gold); color: var(--bg);
      font-weight: 700; font-size: 1rem; padding: 13px;
      border-radius: 10px; border: none; cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: var(--gold2); }
    .login-error { color: var(--red); font-size: .82rem; margin-top: 10px; display: none; }
  </style>
</head>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-box">

    <div class="login-sub">Prospecção — Salvador, BA</div>
    <input type="password" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()" />
    <button class="login-btn" onclick="checkLogin()">Entrar</button>
    <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<header>
  <div>
    <div class="logo">Prospecção <span>/ Salvador, BA</span></div>
    <div class="header-sub">Gerencie seus contatos e acompanhe o status de cada lead</div>
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar empresa..." oninput="renderTable()" />
    </div>
    <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('Psicólogo / Terapeuta', this)">🧠 Psicólogos</button>
    <button class="filter-btn" onclick="setFilter('Médico / Clínica', this)">🏥 Médicos</button>
    <button class="filter-btn" onclick="setFilter('Salão / Estética', this)">💇 Salões</button>
    <button class="filter-btn" onclick="setFilter('Escola Particular', this)">🏫 Escolas</button>
    <button class="filter-btn" onclick="setFilter('Academia / CrossFit', this)">💪 Academias</button>
    <button class="filter-btn" onclick="setFilter('Odontologia', this)">🦷 Odonto</button>
    <button class="filter-btn" onclick="setFilter('Contabilidade', this)">📊 Contábeis</button>
    <button class="filter-btn" onclick="setFilter('Barbearia', this)">✂️ Barbearias</button>
    <button class="add-btn" onclick="openModal()">+ Adicionar Lead</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Empresa</th>
          <th>Nicho</th>
          <th>Contato</th>
          <th>Site</th>
          <th>Status</th>
          <th>Anotações</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">
      <div style="font-size:2.5rem">🔍</div>
      <p>Nenhum lead encontrado com esse filtro.</p>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Adicionar novo lead</h3>
    <div class="form-group"><label>Nome da empresa</label><input id="f-nome" placeholder="Ex: Clínica Vida Plena" /></div>
    <div class="form-group"><label>Nicho</label>
      <select id="f-nicho">
        <option>Psicólogo / Terapeuta</option>
        <option>Médico / Clínica</option>
        <option>Salão / Estética</option>
        <option>Escola Particular</option>
        <option>Academia / CrossFit</option>
        <option>Odontologia</option>
        <option>Contabilidade</option>
        <option>Barbearia</option>
      </select>
    </div>
    <div class="form-group"><label>WhatsApp</label><input id="f-wa" placeholder="71 9XXXX-XXXX" /></div>
    <div class="form-group"><label>Telefone</label><input id="f-tel" placeholder="71 XXXX-XXXX" /></div>
    <div class="form-group"><label>Site (URL)</label><input id="f-site" placeholder="https://..." /></div>
    <div class="form-group"><label>Endereço</label><input id="f-end" placeholder="Bairro, Salvador" /></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveModal()">Salvar lead</button>
    </div>
  </div>
</div>

let leads = JSON.parse(localStorage.getItem('prospects_v1')) || DEFAULT_DATA;
let activeFilter = 'todos';

function save() { localStorage.setItem('prospects_v1', JSON.stringify(leads)); }

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return leads.filter(l => {
    const matchNicho = activeFilter === 'todos' || l.nicho === activeFilter;
    const matchQ = !q || l.nome.toLowerCase().includes(q) || l.nicho.toLowerCase().includes(q) || (l.end||'').toLowerCase().includes(q);
    return matchNicho && matchQ;
  });
}

function renderStats() {
  const counts = { total: leads.length, Fechado:0, Interessado:0, Contatado:0, 'A prospectar':0 };
  leads.forEach(l => { if (counts[l.status] !== undefined) counts[l.status]++; });
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num total">${counts.total}</div><div class="lbl">Total de leads</div></div>
    <div class="stat-card"><div class="num amarelo">${counts['A prospectar']}</div><div class="lbl">A prospectar</div></div>
    <div class="stat-card"><div class="num azul">${counts.Contatado}</div><div class="lbl">Contatados</div></div>
    <div class="stat-card"><div class="num amarelo">${counts.Interessado}</div><div class="lbl">Interessados</div></div>
    <div class="stat-card"><div class="num verde">${counts.Fechado}</div><div class="lbl">Fechados 🎉</div></div>
  `;
}

function renderTable() {
  const rows = filtered();
  const tbody = document.getElementById('tableBody');
  document.getElementById('emptyState').style.display = rows.length ? 'none' : 'block';
  tbody.innerHTML = rows.map(l => {
    const waBtn = l.wa ? `<a class="contact-btn btn-wa" href="https://wa.me/${l.wa}" target="_blank">💬 WhatsApp</a>` : '';
    const telBtn = l.tel ? `<span class="contact-btn btn-tel">📞 ${fmtTel(l.tel)}</span>` : '';
    const siteCol = l.site
      ? `<a class="contact-btn btn-web" href="${l.site}" target="_blank">🌐 Ver site</a>`
      : `<span class="no-site">⚠ Sem site</span>`;
    const statusOpts = STATUS_OPTS.map(s => `<option ${s===l.status?'selected':''}>${s}</option>`).join('');
    const color = STATUS_COLOR[l.status] || '#8A90A2';
    return `
      <tr>
        <td><div class="company-name">${l.nome}</div><div class="company-addr">${l.end||''}</div></td>
        <td><span class="nicho-badge ${NICHO_CLASS[l.nicho]||''}">${l.nicho}</span></td>
        <td><div class="contact-links">${waBtn}${telBtn}</div></td>
        <td>${siteCol}</td>
        <td>
          <select class="status-sel" style="color:${color}" onchange="changeStatus(${l.id}, this.value)">
            ${statusOpts}
          </select>
        </td>
        <td>
          <input class="notes-input" placeholder="Adicionar nota..." value="${l.notas||''}"
            onchange="changeNotes(${l.id}, this.value)" />
        </td>
      </tr>`;
  }).join('');
  renderStats();
}

function fmtTel(t) {
  const d = t.replace(/\D/g,'').replace(/^55/,'');
  if (d.length===11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if (d.length===10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return t;
}

function changeStatus(id, val) {
  leads = leads.map(l => l.id===id ? {...l, status:val} : l);
  save(); renderTable();
}

function changeNotes(id, val) {
  leads = leads.map(l => l.id===id ? {...l, notas:val} : l);
  save();
}

let nextId = () => Math.max(...leads.map(l=>l.id), 0) + 1;

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-nome','f-wa','f-tel','f-site','f-end'].forEach(id => document.getElementById(id).value = '');
}

function saveModal() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Informe o nome da empresa.'); return; }
  leads.push({
    id: nextId(),
    nome,
    nicho: document.getElementById('f-nicho').value,
    wa: document.getElementById('f-wa').value.replace(/\D/g,''),
    tel: document.getElementById('f-tel').value.replace(/\D/g,''),
    site: document.getElementById('f-site').value.trim(),
    end: document.getElementById('f-end').value.trim(),
    status: 'A prospectar',
    notas: ''
  });
  save(); closeModal(); renderTable();
}

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

renderTable();

// ── AUTH ──
const PWD_HASH = 'f77911f675dc4ab494304ed1de18f2e67dbe4982dfacffefbd4d2ac3cabd8b82';
async function hash(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkLogin() {
  const val = document.getElementById('pwdInput').value;
  const h = await hash(val);
  if (h === PWD_HASH) {
    sessionStorage.setItem('dash_auth', '1');
    document.getElementById('loginOverlay').style.display = 'none';
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}
if (sessionStorage.getItem('dash_auth') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
}
